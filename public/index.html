<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>CF Chat</title>
<style>
*{box-sizing:border-box;margin:0}
body{font-family:sans-serif;display:flex;height:100vh}
#sidebar{width:180px;background:#2b2d31;color:#fff;padding:8px;overflow-y:auto}
#sidebar img{width:28px;height:28px;border-radius:50%;vertical-align:middle;margin-right:4px}
#main{flex:1;display:flex;flex-direction:column}
#msgs{flex:1;padding:10px;overflow-y:auto;background:#313338}
.msg{color:#dcddde;margin:4px 0}.msg b{color:#57a8ff}
#login,#chat{display:none;padding:16px} input{padding:6px;margin:4px 0;width:220px;display:block}
button{cursor:pointer;padding:6px 14px;margin-top:6px}
#topbar{background:#1e1f22;color:#fff;padding:6px 12px;display:flex;justify-content:space-between;align-items:center}
#topbar img{width:24px;height:24px;border-radius:50%;vertical-align:middle;margin-right:4px}
</style></head>
<body>

<div id="login">
  <h3>注册 / 登录（输入QQ号+密码）</h3>
  <p style="color:#e74c3c;font-size:12px">⚠️ 请勿填写你真实QQ密码！仅为本站独立密码</p>
  QQ号：<input id="qq" placeholder="QQ号"><br>
  密码：<input id="pwd" type="password" placeholder="本站独立密码"><br>
  昵称（注册时填）：<input id="nick" placeholder="自定义昵称，留空默认QQ号"><br>
  <button onclick="reg()">注册</button>
  <button onclick="login()">登录</button>
  <pre id="tip"></pre>
</div>

<div id="main">
  <div id="topbar">
    <span id="meInfo"></span>
    <span><input id="newNick" placeholder="新昵称" style="width:100px;padding:2px">
    <button onclick="chgNick()" style="padding:2px 8px">改昵称</button></span>
  </div>
  <div id="msgs"></div>
  <div style="padding:8px;background:#383a40">
    <input id="inputMsg" style="width:80%" placeholder="说点什么…" onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">发送</button>
  </div>
</div>

<div id="sidebar"><b>在线/用户</b><hr id="userList"></div>

<script>
let myQQ='',myNick='',lastId=0

function api(path,opt={}){return fetch(path,opt).then(r=>r.json())}

async function reg(){
  const r=await api('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({qq:qq.value.trim(),password:pwd.value,nickname:nick.value.trim()||qq.value.trim()})})
  tip.textContent=r.ok?'注册成功，请登录':JSON.stringify(r)
}
async function login(){
  const r=await api('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({qq:qq.value.trim(),password:pwd.value})})
  if(r.err){tip.textContent=r.err;return}
  myQQ=r.qq;myNick=r.nickname
  login.style.display='none';main.style.display='flex'
  meInfo.innerHTML=`<img src="https://q.qlogo.cn/headimg_dl?dst_uin=${myQQ}&spec=100"> ${myNick}`
  loadUsers();poll()
}
async function chgNick(){
  await api('/api/user/nickname',{method:'PATCH',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({qq:myQQ,nickname:newNick.value.trim()||myNick})})
  myNick=newNick.value.trim()||myNick
  meInfo.innerHTML=`<img src="https://q.qlogo.cn/headimg_dl?dst_uin=${myQQ}&spec=100"> ${myNick}`
}
async function send(){
  const v=inputMsg.value.trim();if(!v)return
  await api('/api/msg',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({qq:myQQ,content:v})})
  inputMsg.value=''
}
async function loadUsers(){
  const us=await api('/api/users')
  userList.innerHTML=us.map(u=>`<div><img src="https://q.qlogo.cn/headimg_dl?dst_uin=${u.qq}&spec=100">${u.nickname}</div>`).join('')
}
async function poll(){
  const msgs=await api('/api/msgs?since='+lastId)
  for(const m of msgs){
    const d=document.createElement('div');d.className='msg'
    d.innerHTML=`<img src="https://q.qlogo.cn/headimg_dl?dst_uin=${m.qq}&spec=100" style="width:20px;height:20px;border-radius:50%;vertical-align:middle"> <b>${m.nickname||m.qq}</b>: ${escapeHtml(m.content)}`
    document.getElementById('msgs').appendChild(d)
    lastId=Math.max(lastId,m.id)
  }
  if(msgs.length) msgsDiv.scrollTop=msgsDiv.scrollHeight
  setTimeout(poll,2000)
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')}

login.style.display='block'
const msgsDiv=document.getElementById('msgs')
</script>
</body>
</html>
