<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QQ群聊</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;display:flex;justify-content:center}
#app{width:100%;max-width:420px;height:100vh;display:flex;flex-direction:column;background:#fff;transition:.3s}

/* 顶部导航栏 */
header{padding:10px 12px;background:#0088ff;color:#fff;font-size:15px;display:flex;align-items:center;gap:8px}
header img{width:34px;height:34px;border-radius:50%}

/* --- 公告横幅样式 --- */
#topBanner{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
  padding:10px 14px;
  font-size:14px;
  text-align:center;
  display:none;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-height:40px;
  word-break:break-word;
}
#topBanner.show { display: flex !important; }
#topBanner .banner-text{flex:1}
#topBanner .edit-banner{
  cursor:pointer;
  font-size:16px;
  opacity:.8;
  flex-shrink:0;
  margin-left:10px;
}
#topBanner .edit-banner:hover{opacity:1}
/* -------------------- */

#box{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;background:#e5ddd5}
.msg{display:flex;gap:6px;align-items:flex-start;animation:fadeIn .2s}
.msg.me{flex-direction:row-reverse}
.msg.me .bubble{background:#95ec69;border-radius:10px 0 10px 10px}
.msg.me .name{display:none}
.bubble{background:#fff;padding:8px 12px;border-radius:0 10px 10px 10px;box-shadow:0 1px 1px rgba(0,0,0,.05);max-width:70%}
.name{font-size:12px;color:#888;margin-bottom:2px}
.time{font-size:10px;color:#aaa;margin-top:2px}
.input-area{display:flex;padding:8px;border-top:1px solid #ddd;background:#f7f7f7;gap:8px;align-items:center}
.input-area input{flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:20px;outline:none;font-size:14px}
.input-area button{padding:8px 16px;border:none;border-radius:20px;background:#0088ff;color:#fff;cursor:pointer}
.bottom-bar{display:flex;justify-content:center;padding:5px 0;background:#fff;border-top:1px solid #eee;font-size:12px;color:#999}

/* 登录弹窗 */
#loginBox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;justify-content:center;align-items:center;z-index:100;}
#loginBox .box{background:#fff;padding:20px;border-radius:10px;width:80%;max-width:300px;}
#loginBox h3{text-align:center;margin-bottom:15px;font-size:16px;}
#loginBox input{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;margin-bottom:10px;box-sizing:border-box;}
#loginBox button{width:100%;padding:10px;background:#0088ff;color:#fff;border:none;border-radius:4px;cursor:pointer;}
.error-msg{color:red;font-size:12px;text-align:center;margin-top:5px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <!-- 公告横幅 -->
  <div id="topBanner">
    <span class="banner-text"></span>
    <span class="edit-banner" title="修改公告" style="display:none;">✏️</span>
  </div>

  <!-- 顶部导航 -->
  <header>
    <img id="myAvatar" src="https://q1.qlogo.cn/g?b=qq&nk=12345&s=100" alt="头像">
    <span id="myName">QQ群聊</span>
    <span style="margin-left:auto;font-size:18px;">🌙</span>
    <span style="cursor:pointer;">改昵称</span>
    <span style="cursor:pointer;">退出</span>
  </header>

  <!-- 消息区域 -->
  <div id="box"></div>

  <!-- 底部输入 -->
  <div class="input-area">
    <div style="font-size:24px;cursor:pointer;padding:0 5px;">😀</div>
    <input type="text" id="msgInput" placeholder="请输入消息..." disabled>
    <button id="sendBtn" disabled>发送</button>
  </div>
  
  <!-- 底部提示 -->
  <div class="bottom-bar">
    <span id="statusText">未登录</span>
  </div>
</div>

<!-- 登录弹窗 -->
<div id="loginBox">
  <div class="box">
    <h3>QQ账号登录</h3>
    <input type="text" id="loginQQ" placeholder="请输入QQ号" maxlength="13">
    <input type="password" id="loginPwd" placeholder="请输入密码">
    <div class="error-msg" id="loginErr"></div>
    <button id="doLogin">登录 / 注册</button>
  </div>
</div>

<script>
const box = document.getElementById('box');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const loginBox = document.getElementById('loginBox');
const doLogin = document.getElementById('doLogin');
const loginQQ = document.getElementById('loginQQ');
const loginPwd = document.getElementById('loginPwd');
const loginErr = document.getElementById('loginErr');
const myName = document.getElementById('myName');
const topBanner = document.getElementById('topBanner');
const bannerText = topBanner.querySelector('.banner-text');
const editBannerBtn = topBanner.querySelector('.edit-banner');
const statusText = document.getElementById('statusText');

let currentUser = null;
let isAdmin = false;

// 1. 页面加载时：检查登录状态 + 获取公告
document.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem('user');
  if(saved) {
    try {
      currentUser = JSON.parse(saved);
      updateUI();
      loadAnnouncement();
      return;
    } catch(e){}
  }
  showLogin();
});

// 加载公告
async function loadAnnouncement() {
  try {
    const res = await fetch('/api/announcement');
    const data = await res.json();
    if(data.content && data.content.trim()) {
      bannerText.innerText = data.content;
      topBanner.classList.add('show');
    } else {
      topBanner.classList.remove('show');
    }
  } catch(e) {
    console.log('获取公告失败', e);
  }
}

// 管理员点击修改公告
editBannerBtn.addEventListener('click', () => {
  if(!isAdmin) return;
  const newContent = prompt('请输入新的公告内容：', bannerText.innerText);
  if(newContent !== null) {
    fetch('/api/setannouncement', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ qq: currentUser.qq, content: newContent })
    }).then(res => res.json()).then(d => {
      if(d.ok) {
        bannerText.innerText = newContent;
        alert('公告已修改');
      } else {
        alert('修改失败：' + (d.err || '未知错误'));
      }
    });
  }
});

// 2. 显示登录框
function showLogin() {
  loginBox.style.display = 'flex';
  msgInput.disabled = true;
  sendBtn.disabled = true;
  statusText.innerText = '未登录';
}

// 3. 登录/注册逻辑
doLogin.addEventListener('click', async () => {
  const qq = loginQQ.value.trim();
  const pwd = loginPwd.value.trim();
  loginErr.innerText = '';
  
  if(!/^\d{5,13}$/.test(qq)) { loginErr.innerText='QQ号格式错误';return; }
  if(!pwd) { loginErr.innerText='请输入密码';return; }

  const res = await fetch('/api/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ qq, pwd, nickname: '用户'+qq.slice(-4) })
  });
  const data = await res.json();
  
  if(data.err) {
    loginErr.innerText = data.err;
  } else {
    currentUser = { qq, nickname: data.nickname };
    localStorage.setItem('user', JSON.stringify(currentUser));
    updateUI();
    loginBox.style.display = 'none';
    loadAnnouncement();
    addSystemMsg('欢迎 ' + currentUser.nickname + ' 加入群聊！');
  }
});

// 4. 更新UI（登录后）
function updateUI() {
  if(!currentUser) return showLogin();
  msgInput.disabled = false;
  sendBtn.disabled = false;
  myName.innerText = currentUser.nickname;
  document.getElementById('myAvatar').src = `https://q1.qlogo.cn/g?b=qq&nk=${currentUser.qq}&s=100`;
  
  // 管理员判断（示例：QQ 123456789 是管理员）
  isAdmin = (currentUser.qq === '123456789'); 
  if(isAdmin) {
    editBannerBtn.style.display = 'block';
  }
  
  statusText.innerText = '已登录';
}

// 5. 发送消息
sendBtn.addEventListener('click', sendMsg);
msgInput.addEventListener('keypress', (e) => { if(e.key==='Enter') sendMsg(); });

async function sendMsg() {
  const content = msgInput.value.trim();
  if(!content) return;
  
  const res = await fetch('/api/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ 
      qq: currentUser.qq, 
      nickname: currentUser.nickname, 
      content: content  // 改为 content 匹配后端
    })
  });
  const data = await res.json();
  if(data.ok) {
    msgInput.value = '';
  } else {
    alert('发送失败：' + data.err);
  }
}

// 6. 拉取消息
async function loadMsgs() {
  try {
    const res = await fetch('/api/msgs');  // 改为 /api/msgs 匹配后端
    if (!res.ok) return;
    const msgs = await res.json();
    box.innerHTML = '';
    msgs.forEach(m => addMsg(m));
    scrollBottom();
  } catch(e) {
    console.log('加载消息失败', e);
  }
}

// 7. 添加消息到页面
function addMsg(m) {
  const div = document.createElement('div');
  div.className = 'msg' + (m.qq === currentUser?.qq ? ' me' : '');
  const avatar = `https://q1.qlogo.cn/g?b=qq&nk=${m.qq}&s=100`;
  div.innerHTML = `
    <img src="${avatar}" width="30" height="30" style="border-radius:50%;margin-top:4px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23ccc%22/%3E%3Ctext x=%2250%22 y=%2260%22 text-anchor=%22middle%22 font-size=%2230%22 fill=%22%23fff%22%3E${m.qq.slice(-2)}%3C/text%3E%3C/svg%3E'">
    <div style="display:flex;flex-direction:column;">
      <div class="name">${m.nickname}</div>
      <div class="bubble">${escapeHtml(m.content)}
        <div class="time">${formatTime(m.time)}</div>
      </div>
    </div>
  `;
  box.appendChild(div);
}

// HTML转义防止XSS
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 系统消息
function addSystemMsg(txt) {
  const div = document.createElement('div');
  div.className = 'msg';
  div.style.justifyContent='center';
  div.style.color='#666';
  div.innerHTML = `<div class="bubble" style="background:#fff;color:#666;font-size:12px;">${txt}</div>`;
  box.appendChild(div);
}

// 滚动到底部
function scrollBottom() {
  setTimeout(() => {
    box.scrollTop = box.scrollHeight;
  }, 100);
}

// 格式化时间
function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

// 定时刷新消息（每2秒）
let loadTimer = setInterval(loadMsgs, 2000);
// 首次加载
loadMsgs();
</script>
</body>
</html>
