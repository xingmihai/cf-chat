<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QQ群聊</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;display:flex;justify-content:center}
#app{width:100%;max-width:420px;height:100vh;display:flex;flex-direction:column;background:#fff;transition:.3s}
header{padding:10px 12px;background:#0088ff;color:#fff;font-size:15px;display:flex;align-items:center;gap:8px}
header img{width:32px;height:32px;border-radius:50%}
#box{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.msg{display:flex;gap:6px;align-items:flex-start;animation:fadeIn .2s}
.msg.me{flex-direction:row-reverse}
.msg.me .bubble{background:#95ec69;border-radius:10px 0 10px 10px}
.msg.me .time{text-align:right}
.msg img{width:38px;height:38px;border-radius:50%;flex-shrink:0}
.bubble{max-width:75%;background:#f0f0f0;padding:6px 10px;border-radius:0 10px 10px 10px;font-size:14px}
.bubble .nm{font-size:12px;color:#0088ff;margin-bottom:2px}
.time{font-size:11px;color:#999;margin-top:2px}
input,button{font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:6px}
button{background:#0088ff;color:#fff;border:none;cursor:pointer}
#login,#chat{display:none;flex-direction:column;flex:1}
#login{padding:25px;gap:12px}
#bar{display:flex;padding:8px 10px;gap:6px;border-top:1px solid #eee}
#bar input{flex:1}
#set{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;place-items:center}
#set>div{background:#fff;padding:18px;border-radius:10px;display:flex;flex-direction:column;gap:8px;width:90%;max-width:320px}

.del-btn{font-size:11px;color:#999;cursor:pointer;margin-left:6px;display:none}
.msg:hover .del-btn{display:inline}
.dark .del-btn{color:#666}

/* 暗黑模式 */
.dark #app{background:#1a1a2e;color:#eee}
.dark .bubble{background:#16213e;color:#eee}
.dark .bubble .nm{color:#4fc3f7}
.dark .msg.me .bubble{background:#1b4332;color:#eee}
.dark .time{color:#888}
.dark #bar{border-top-color:#333}
.dark #bar input{background:#16213e;color:#eee;border-color:#333}
.dark #set>div{background:#1a1a2e;color:#eee}
.dark #set input{background:#16213e;color:#eee;border-color:#333}
.dark #login input{background:#16213e;color:#eee;border-color:#333}
.dark #login h3{color:#eee}
.dark header{background:#0d47a1}
.dark button{background:#1565c0}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
 <div id="login">
  <h3 style="text-align:center">QQ号登录/注册</h3>
  <input id="iqq" placeholder="QQ号（纯数字）" inputmode="numeric">
  <input id="ipwd" type="password" placeholder="⚠️ 不要填真实QQ密码，仅作本网站登录用">
  <input id="iname" placeholder="自定义昵称（注册时填，登录时可不填）">
  <button onclick="reg()">注 册</button>
  <button onclick="login()">登 录</button>
  <div id="lerr" style="color:red;font-size:13px"></div>
 </div>
 <header id="hdr" style="display:none">
  <img id="himg"><span id="hnm"></span>
  <span id="onlineCount" style="font-size:12px;margin-left:4px;opacity:.8"></span>
  <button style="margin-left:auto;font-size:12px;padding:4px 8px" onclick="toggleDark()">🌙</button>
  <button style="font-size:12px;padding:4px 8px" onclick="showSet()">改昵称</button>
  <button style="font-size:12px;padding:4px 8px" onclick="logout()">退出</button>
 </header>
 <div id="box"></div>
 <div id="bar" style="display:none"><input id="itxt" placeholder="说点什么…" onkeydown="if(event.key==='Enter')send()"><button onclick="send()">发送</button></div>
</div>
<div id="set"><div>
  <h4>修改昵称（需验证密码）</h4>
  <input id="soldpwd" type="password" placeholder="当前密码">
  <input id="snewname" placeholder="新昵称">
  <button onclick="chgName()">保存</button>
  <button onclick="closeSet()">取消</button>
  <div id="serr" style="color:red;font-size:12px"></div>
</div></div>
<script>
const API='';
let _qq='',_nm='';
let _isAdmin = false;
const $ = s=>document.querySelector(s);

function show(id){
  document.querySelectorAll('#login,#chat,#hdr,#bar').forEach(e=>e.style.display='none');
  $(id).style.display='flex';
}

// 暗黑模式切换
function toggleDark(){
  document.body.classList.toggle('dark');
  const isDark=document.body.classList.contains('dark');
  localStorage.setItem('dark',isDark?'1':'');
  document.querySelector('#hdr button:first-child').textContent=isDark?'☀️':'🌙';
}
// 初始化暗黑模式
if(localStorage.getItem('dark')){
  document.body.classList.add('dark');
}

function formatTime(unixTs){
  if(!unixTs) return '';
  const d=new Date(unixTs*1000);
  const now=new Date();
  const today=d.toDateString()===now.toDateString()?'今天':
              new Date(now-864e5).toDateString()===d.toDateString()?'昨天':
              d.getFullYear()===now.getFullYear()?(d.getMonth()+1)+'/'+d.getDate():
              d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
  const h=d.getHours().toString().padStart(2,'0');
  const m=d.getMinutes().toString().padStart(2,'0');
  return today+' '+h+':'+m;
}

if(localStorage.qq) autoLogin(); else show('#login');

async function reg(){
 const qq=$('#iqq').value.trim(), pwd=$('#ipwd').value, nm=$('#iname').value.trim()||qq;
 if(!qq||!pwd) return $('#lerr').textContent='请填QQ号和密码';
 const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qq,pwd,nickname:nm})});
 const j=await r.json(); if(j.err) return $('#lerr').textContent=j.err;
 enter(qq,nm);
}

async function login(){
 const qq=$('#iqq').value.trim(), pwd=$('#ipwd').value;
 if(!qq||!pwd) return $('#lerr').textContent='请填QQ号和密码';
 const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qq,pwd})});
 const j=await r.json(); if(j.err) return $('#lerr').textContent=j.err;
 enter(j.qq,j.nickname);
}

function autoLogin(){
 const qq=localStorage.qq,nm=localStorage.nm;
 if(qq) enter(qq,nm,false);
}

function enter(qq,nm,save=true){
 _qq=qq;_nm=nm;
_isAdmin = false;
 if(save){localStorage.qq=qq;localStorage.nm=nm}
 $('#himg').src='https://q.qlogo.cn/headimg_dl?dst_uin='+qq+'&spec=100';
 $('#hnm').textContent=nm;
 $('#login').style.display='none';
 $('#hdr').style.display='flex';
 $('#bar').style.display='flex';
 load();
 setInterval(load,3000);
 heartbeat();
 setInterval(heartbeat,28000);
 updateOnline();
 checkAdmin();
 setInterval(updateOnline,14000);
}

async function load(){
 const r=await fetch('/api/messages'), j=await r.json();
 let html='';
 for(let m of j){
   const isMe=m.qq===_qq;
   const meClass=isMe?'me':'';
   html += '<div class="msg '+meClass+'">' +
     '<img src="https://q.qlogo.cn/headimg_dl?dst_uin='+m.qq+'&spec=100" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22/>\'">' +
     '<div class="bubble"><div class="nm">'+esc(m.nickname)+'</div>'+esc(m.content)+
     '<div class="time">'+formatTime(m.time)+
     (_isAdmin?' <span class="del-btn" onclick="delMsg('+m.id+')">🗑️</span>':'')+
     '</div></div>' +
     '</div>';
 }
 $('#box').innerHTML=html;
 $('#box').scrollTop=$('#box').scrollHeight;
}

async function send(){
 const t=$('#itxt').value.trim(); if(!t)return;
 await fetch('/api/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qq:_qq,nickname:_nm,content:t})});
 $('#itxt').value=''; load();
}

function showSet(){$('#set').style.display='grid';$('#snewname').value=_nm}
function closeSet(){$('#set').style.display='none';$('#serr').textContent=''}

async function chgName(){
 const r=await fetch('/api/profile',{method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({qq:_qq,pwd:$('#soldpwd').value,nickname:$('#snewname').value.trim()||_nm})});
 const j=await r.json(); if(j.err) return $('#serr').textContent=j.err;
 _nm=j.nickname; localStorage.nm=_nm; $('#hnm').textContent=_nm; closeSet(); load();
}

function logout(){ localStorage.clear(); location.reload() }

async function heartbeat(){
  await fetch('/api/heartbeat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qq:_qq})});
}

async function updateOnline(){
  try {
    const r=await fetch('/api/online');
    const j=await r.json();
    $('#onlineCount').textContent='👤'+j.count;
  } catch(e){}
}

async function checkAdmin(){
  try {
    const r=await fetch('/api/checkadmin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qq:_qq})});
    const j=await r.json();
    _isAdmin = j.admin || false;
  } catch(e){}
}

async function delMsg(id){
  if(!confirm('确认删除这条消息？')) return;
  await fetch('/api/delmsg',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qq:_qq,msgId:id})});
  load();
}

function esc(s){const d=document.createElement('d');d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
