<div id="login-wrap">
  <h2>📧 聊天室</h2>
  
  <!-- 登录表单 -->
  <div id="login-form">
    <h3>登录</h3>
    <input id="lemail" type="email" placeholder="邮箱" required>
    <input id="lpassword" type="password" placeholder="密码（仅本站登录用，请勿输入真实密码）">
    <button onclick="doLogin()">登录</button>
    <p style="font-size:12px;color:#999;margin-top:8px">还没有账号？<a href="#" onclick="showRegister()">立即注册</a></p>
    <p id="lerr" style="color:#e74c3c;font-size:12px;margin-top:4px"></p>
  </div>
  
  <!-- 注册表单（初始隐藏） -->
  <div id="register-form" style="display:none">
    <h3>注册</h3>
    <input id="remail" type="email" placeholder="邮箱" required>
    <input id="rnick" placeholder="昵称" required>
    <input id="rqq" placeholder="QQ号（可选，用于显示头像）">
    <input id="rpassword" type="password" placeholder="设置密码（仅本站登录用，请勿输入真实密码）" required>
    <button onclick="sendRegisterCode()">发送验证码</button>
    <input id="rcode" placeholder="6位验证码" maxlength="6">
    <button onclick="doRegister()">注册</button>
    <p style="font-size:12px;color:#999;margin-top:8px">已有账号？<a href="#" onclick="showLogin()">去登录</a></p>
    <p id="rerr" style="color:#e74c3c;font-size:12px;margin-top:4px"></p>
  </div>
</div>
