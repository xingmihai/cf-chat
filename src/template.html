<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邮箱聊天室</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.6 sans-serif;background:#f5f7fa;display:flex;flex-direction:column;height:100vh}
#banner{background:#fffbdd;border-bottom:1px solid #e6d96b;padding:6px 12px;font-size:13px;color:#7a6300;cursor:pointer}
#login-wrap{margin:auto;background:#fff;padding:24px 28px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.08);width:340px;max-width:90vw}
#login-wrap h2{margin-bottom:12px}
#login-wrap input,#login-wrap button{width:100%;margin:6px 0;padding:8px;border:1px solid #ddd;border-radius:4px}
#login-wrap input:focus{outline:none;border-color:#4f6ef7}
button{cursor:pointer;border:none;border-radius:4px;background:#4f6ef7;color:#fff;font-size:14px;padding:8px 16px}
button:hover{opacity:0.9}
button.secondary{background:#999}
#app{flex:1;display:none;flex-direction:column;max-width:720px;margin:0 auto;width:100%}
#chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg img{width:36px;height:36px;border-radius:50%;object-fit:cover;background:#eee}
.msg .body{flex:1;min-width:0}
.msg .meta{font-size:11px;color:#999}
.msg .del{color:#e74c3c;cursor:pointer;font-size:12px;margin-left:8px;opacity:0.7}
.msg .del:hover{opacity:1}
#input-bar{display:flex;gap:6px;padding:8px 12px;border-top:1px solid #ddd;background:#fff}
#input-bar input{flex:1;padding:8px;border:1px solid #ddd;border-radius:4px}
#input-bar input:focus{outline:none;border-color:#4f6ef7}
#userbar{padding:6px 12px;font-size:13px;color:#555;border-bottom:1px solid #eee;background:#fff;display:flex;justify-content:space-between;align-items:center}
#lerr{color:#e74c3c;font-size:12px;margin-top:4px}
</style>
</head>
<body>

<div id="banner">加载公告...</div>

<div id="login-wrap">
  <h2>📧 邮箱登录 / 注册</h2>
  <input id="lemail" type="email" placeholder="请输入邮箱" required>
  <input id="lnick" placeholder="昵称（首次注册填写）">
  <input id="lqq" placeholder="QQ号（可选，用于显示头像）">
  <button onclick="sendCode()">发送验证码</button>
  <input id="lcode" placeholder="6位验证码" maxlength="6">
  <button onclick="doLogin()">登录 / 注册</button>
  <p id="lerr"></p>
</div>

<div id="app">
  <div id="userbar">
    <span id="uname"></span>
    <button class="secondary" onclick="logout()" style="padding:4px 12px;font-size:12px">退出</button>
  </div>
  <div id="chat"></div>
  <div id="input-bar">
    <input id="txt" placeholder="按 Enter 发送消息..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
let token = '';
let me = {};
let pollTimer = null;

const $ = (id) => document.getElementById(id);

async function api(path, opt = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(path, { ...opt, headers });
  return res.json();
}

async function sendCode() {
  const email = $('lemail').value.trim();
  if (!email || !email.includes('@')) {
    $('lerr').textContent = '请输入有效的邮箱地址';
    return;
  }
  $('lerr').textContent = '⏳ 正在发送验证码...';
  try {
    await api('/api/send-code', {
      method: 'POST',
      body: JSON.stringify({ email })
    });
    $('lerr').textContent = '✅ 验证码已发送！请在 Worker 日志中查看';
  } catch(e) {
    $('lerr').textContent = '❌ 发送失败，请重试';
  }
}

async function doLogin() {
  const email = $('lemail').value.trim();
  const code = $('lcode').value.trim();
  const nickname = $('lnick').value.trim();
  const qq = $('lqq').value.trim();
  
  if (!email || !code) {
    $('lerr').textContent = '请填写邮箱和验证码';
    return;
  }
  
  try {
    const res = await api('/api/login', {
      method: 'POST',
      body: JSON.stringify({ email, code, nickname, qq })
    });
    
    if (res.err) {
      $('lerr').textContent = res.err;
      return;
    }
    
    token = res.token;
    me = res.user;
    sessionStorage.setItem('chat_token', token);
    showApp();
  } catch(e) {
    $('lerr').textContent = '登录失败，请重试';
  }
}

function logout() {
  sessionStorage.removeItem('chat_token');
  location.reload();
}

function showApp() {
  $('login-wrap').style.display = 'none';
  $('app').style.display = 'flex';
  
  const displayName = me.nickname + (me.is_admin ? ' 👑' : '');
  $('uname').textContent = displayName;
  
  // 管理员双击横幅修改公告
  if (me.is_admin) {
    $('banner').style.cursor = 'pointer';
    $('banner').ondblclick = editAnnounce;
  }
  
  loadMsgs();
  pollTimer = setInterval(loadMsgs, 5000);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function loadMsgs() {
  try {
    const msgs = await api('/api/msgs');
    const chatEl = $('chat');
    
    chatEl.innerHTML = msgs.map(m => `
      <div class="msg">
        <img src="${m.avatar || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2236%22 height=%2236%22%3E%3Crect fill=%22%23ddd%22 width=%2236%22 height=%2236%22/%3E%3Ctext x=%2218%22 y=%2224%22 text-anchor=%22middle%22 font-size=%2216%22 fill=%22%23999%22%3E?%3C/text%3E%3C/svg%3E'}" alt="头像">
        <div class="body">
          <div>
            <strong>${escapeHtml(m.nickname)}</strong>
            <span class="meta">${m.created_at}</span>
            ${me.is_admin ? `<span class="del" onclick="deleteMsg(${m.id})">🗑 删除</span>` : ''}
          </div>
          <div>${escapeHtml(m.content)}</div>
        </div>
      </div>
    `).join('');
    
    chatEl.scrollTop = chatEl.scrollHeight;
  } catch(e) {
    console.error('加载消息失败:', e);
  }
}

async function sendMsg() {
  const input = $('txt');
  const content = input.value.trim();
  if (!content) return;
  
  try {
    await api('/api/msgs', {
      method: 'POST',
      body: JSON.stringify({ content })
    });
    input.value = '';
    loadMsgs();
  } catch(e) {
    alert('发送失败，请重试');
  }
}

async function deleteMsg(id) {
  if (!confirm('确定要删除这条消息吗？')) return;
  try {
    await api('/api/msg/' + id, { method: 'DELETE' });
    loadMsgs();
  } catch(e) {
    alert('删除失败');
  }
}

async function editAnnounce() {
  const current = await api('/api/announce');
  const newText = prompt('修改公告内容：', current.announcement || '');
  if (newText !== null && newText !== undefined) {
    try {
      await api('/api/announce', {
        method: 'POST',
        body: JSON.stringify({ announcement: newText })
      });
      loadAnnounce();
    } catch(e) {
      alert('修改失败');
    }
  }
}

async function loadAnnounce() {
  try {
    const res = await api('/api/announce');
    $('banner').textContent = res.announcement || '暂无公告';
  } catch(e) {
    $('banner').textContent = '公告加载失败';
  }
}

// 初始化
(async function init() {
  loadAnnounce();
  
  const savedToken = sessionStorage.getItem('chat_token');
  if (savedToken) {
    token = savedToken;
    try {
      me = await api('/api/me');
      if (me.id) {
        showApp();
        return;
      }
    } catch(e) {}
    // Token无效，清除
    sessionStorage.removeItem('chat_token');
    token = '';
  }
})();
</script>
</body>
</html>
